inherit_from: configs/experiments/full_fast_cold_drug_pairfeat_cuda_b128_interaction_cached_posonly_dualhead_retrieval_reliability_scheme2init_explalign.yaml

training:
  stage5_epochs: 3
  stage5_anchor_weight: 0.25
  stage5_pair_pu_weight: 0.1
  stage5_max_pairs: 2048
  freeze_encoder_stage5: true
  stage5_optimizer:
    path_scorer_lr_multiplier: 0.1
    pair_model_lr_multiplier: 1.0
    freeze_path_scorer: false

pair_pu:
  enabled: true
  pair_score_threshold: 0.72
  top1_path_threshold: 0.55
  top12_margin_threshold: 0.03
  top1_binary_threshold: 0.55
  min_reliability: 0.6
  max_uncertainty: 0.45
  min_confidence: 0.22
  min_bag_size: 2
  min_agreement: 0.6
