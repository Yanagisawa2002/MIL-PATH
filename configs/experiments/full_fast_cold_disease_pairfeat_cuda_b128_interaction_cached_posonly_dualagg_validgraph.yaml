inherit_from: configs/experiments/full_fast_cold_disease_pairfeat_cuda_b128_interaction_cached_posonly_dualagg_minimal_teacherinit_explfreeze.yaml

model:
  dual_aggregation:
    validity_graph_sidecar:
      enabled: true
      use_in_reliability: false
      use_in_calibration: true
      hidden_dim: 128
      dropout: 0.1
      summary_dim: 5
      score_delta_scale: 0.18
      similarity_temperature: 0.65
      schema_boost: 0.24
      hop_boost: 0.1
      source_boost: 0.08
  binary_calibration:
    enabled: true
    pair_feedback_enabled: false
    hidden_dim: 64
    dropout: 0.1
    delta_scale: 0.3
    summary_dim: 3
    graph_feature_dim: 4

training:
  stage3_binary_calibration_aux:
    enabled: false
  stage3_binary_calibration_teacher:
    enabled: false
