inherit_from: configs/experiments/full_fast_cold_drug_pairfeat_cuda_b128_interaction_cached_posonly_dualhead_retrieval_reliability_scheme2init_explalign.yaml

model:
  learned_retrieval:
    shortlist_top_k: 12
  aggregator:
    agreement_aware:
      enabled: true
      explanation_weight: 0.35
      binary_weight: 0.25
      agreement_weight: 0.5
      confidence_weight: 0.15

training:
  stage3_explanation_distillation:
    enabled: true
    weight: 0.05
    top_k: 4
    use_topk_only: true
    min_explanation_prob: 0.6
    min_binary_prob: 0.55
    min_agreement: 0.65
    require_gold_paths: false
