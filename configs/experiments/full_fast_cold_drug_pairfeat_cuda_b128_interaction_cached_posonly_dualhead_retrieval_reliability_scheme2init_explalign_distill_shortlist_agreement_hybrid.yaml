inherit_from: configs/experiments/full_fast_cold_drug_pairfeat_cuda_b128_interaction_cached_posonly_dualhead_retrieval_reliability_scheme2init_explalign_distill_shortlist_agreement_tuned.yaml

model:
  learned_retrieval:
    shortlist_top_k: 16
  aggregator:
    selector_temperature: 0.90
    agreement_aware:
      enabled: true
      explanation_weight: 0.43
      binary_weight: 0.30
      agreement_weight: 0.27
      confidence_weight: 0.15

training:
  stage3_explanation_distillation:
    enabled: true
    weight: 0.025
    top_k: 5
    use_topk_only: true
    min_explanation_prob: 0.56
    min_binary_prob: 0.51
    min_agreement: 0.57
    require_gold_paths: false
