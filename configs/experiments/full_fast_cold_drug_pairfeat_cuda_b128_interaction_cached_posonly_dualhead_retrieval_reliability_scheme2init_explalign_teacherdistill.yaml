inherit_from: configs/experiments/full_fast_cold_drug_pairfeat_cuda_b128_interaction_cached_posonly_dualhead_retrieval_reliability_scheme2init_explalign_distill_shortlist_agreement_tuned.yaml

training:
  stage3_explanation_distillation:
    enabled: true
    weight: 0.02
    start_epoch: 3
    ramp_epochs: 5
    top_k: 6
    use_topk_only: true
    use_relative_to_row_max: true
    explanation_row_ratio: 0.90
    binary_row_ratio: 0.94
    agreement_row_ratio: 0.94
    min_explanation_prob: 0.52
    min_binary_prob: 0.48
    min_agreement: 0.52
    fallback_top1_when_empty: true
    fallback_min_teacher_prob: 0.52
    fallback_min_bag_reliability: 0.35
    require_gold_paths: false
  retrieval_teacher_guided:
    enabled: true
    weight: 0.08
    use_retrieved_only: true
    top_k: 6
    teacher_temperature: 1.0
    student_temperature: 0.9
    gold_boost: 0.75
