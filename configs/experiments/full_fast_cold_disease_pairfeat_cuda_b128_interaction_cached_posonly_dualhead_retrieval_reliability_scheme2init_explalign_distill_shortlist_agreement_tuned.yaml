inherit_from: configs/experiments/full_fast_cold_disease_pairfeat_cuda_b128_interaction_cached_posonly_dualhead_retrieval_reliability_scheme2init_explalign_distill_shortlist_agreement.yaml

model:
  learned_retrieval:
    shortlist_top_k: 16
  aggregator:
    selector_temperature: 0.85
    agreement_aware:
      enabled: true
      explanation_weight: 0.45
      binary_weight: 0.25
      agreement_weight: 0.30
      confidence_weight: 0.15

training:
  stage3_explanation_distillation:
    enabled: true
    weight: 0.03
    top_k: 6
    use_topk_only: true
    min_explanation_prob: 0.55
    min_binary_prob: 0.50
    min_agreement: 0.55
    require_gold_paths: false
